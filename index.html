<script>
// ============ ADVANCED BACKGROUND REMOVAL ============
// Multiple strategies for professional results

let segmenter = null;
let currentImages = [];
let processingQueue = [];

// Initialize AI model
async function initModel() {
  try {
    await tf.setBackend('webgl');
    await tf.ready();
    
    const model = bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation;
    const config = {
      runtime: 'tfjs',
      modelType: 'general'
    };
    segmenter = await bodySegmentation.createSegmenter(model, config);
    document.getElementById('badgeModel').textContent = '✓ AI READY';
    document.getElementById('badgeModel').classList.add('ok');
    return true;
  } catch(e) {
    console.warn('Local AI failed:', e);
    document.getElementById('badgeModel').textContent = '⚠ USING API';
    return false;
  }
}

// ============ METHOD 1: FREE API (remove.bg alternative) ============
// Using Remove.bg free API (50 free credits/month)
// Sign up at https://www.remove.bg/tools-api
async function removeBgWithAPI(imageDataUrl, apiKey = '') {
  // Free alternative: https://api.remove.bg/v1.0/removebg
  // Get free key at: https://www.remove.bg/api
  
  const formData = new FormData();
  const blob = dataURLtoBlob(imageDataUrl);
  formData.append('image_file', blob);
  formData.append('size', 'auto');
  
  try {
    const response = await fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: {
        'X-Api-Key': apiKey || 'YOUR_FREE_API_KEY_HERE' // Get from remove.bg
      },
      body: formData
    });
    
    if (response.ok) {
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    }
    throw new Error('API failed');
  } catch(e) {
    console.warn('API failed, using fallback');
    return null;
  }
}

// ============ METHOD 2: ADVANCED LOCAL PROCESSING ============
// Improved matting algorithm with multiple passes

class AdvancedBackgroundRemoval {
  constructor() {
    this.kernelSize = 3;
  }
  
  // Multi-stage matting for professional results
  async removeBackground(imageElement, bgColor) {
    const canvas = document.createElement('canvas');
    canvas.width = imageElement.width;
    canvas.height = imageElement.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imageElement, 0, 0);
    
    if (!segmenter) {
      await initModel();
    }
    
    if (segmenter) {
      try {
        // Stage 1: Initial segmentation
        const segmentation = await segmenter.segmentPeople(canvas, {
          flattenMasks: false,
          internal: { segmentationThreshold: 0.4 }
        });
        
        if (segmentation && segmentation.length > 0) {
          let mask = segmentation[0].mask;
          let maskData = await mask.toImageData();
          
          // Stage 2: Edge refinement (hair preservation)
          const refinedMask = this.refineMask(maskData, canvas);
          
          // Stage 3: Alpha matting
          const result = this.applyAlphaMatting(canvas, refinedMask, bgColor);
          
          // Stage 4: Post-processing (remove noise)
          const cleaned = this.removeNoise(result);
          
          return cleaned;
        }
      } catch(e) {
        console.warn('Local processing failed:', e);
      }
    }
    
    // Fallback: edge detection + flood fill
    return this.edgeBasedRemoval(canvas, bgColor);
  }
  
  // Advanced mask refinement with hair detail preservation
  refineMask(maskData, originalImage) {
    const width = maskData.width;
    const height = maskData.height;
    const mask = new Float32Array(width * height);
    
    // Convert to float
    for (let i = 0; i < width * height; i++) {
      mask[i] = maskData.data[i * 4] / 255;
    }
    
    // Bilateral filter for edge preservation
    const refined = new Float32Array(mask);
    const radius = 2;
    const sigmaSpatial = 2.0;
    const sigmaColor = 30.0;
    
    const origCtx = document.createElement('canvas').getContext('2d');
    const origCanvas = document.createElement('canvas');
    origCanvas.width = width;
    origCanvas.height = height;
    origCtx.drawImage(originalImage, 0, 0, width, height);
    const origData = origCtx.getImageData(0, 0, width, height).data;
    
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const idx = y * width + x;
        let sum = 0;
        let weight = 0;
        
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              const nidx = ny * width + nx;
              
              const spatialDist = Math.sqrt(dx*dx + dy*dy);
              const spatialWeight = Math.exp(-(spatialDist * spatialDist) / (2 * sigmaSpatial * sigmaSpatial));
              
              const origIdx = (ny * width + nx) * 4;
              const centerIdx = (y * width + x) * 4;
              const colorDist = Math.sqrt(
                Math.pow(origData[origIdx] - origData[centerIdx], 2) +
                Math.pow(origData[origIdx+1] - origData[centerIdx+1], 2) +
                Math.pow(origData[origIdx+2] - origData[centerIdx+2], 2)
              );
              const colorWeight = Math.exp(-(colorDist * colorDist) / (2 * sigmaColor * sigmaColor));
              
              const w = spatialWeight * colorWeight;
              sum += mask[nidx] * w;
              weight += w;
            }
          }
        }
        
        if (weight > 0) {
          refined[idx] = sum / weight;
        }
      }
    }
    
    // Morphological opening (remove small noise)
    const opened = this.morphologicalOpen(refined, width, height, 2);
    
    return opened;
  }
  
  morphologicalOpen(mask, width, height, iterations) {
    let result = new Float32Array(mask);
    
    for (let iter = 0; iter < iterations; iter++) {
      // Erosion
      const eroded = new Float32Array(width * height);
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          let min = 1;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const idx = (y + dy) * width + (x + dx);
              min = Math.min(min, result[idx]);
            }
          }
          eroded[y * width + x] = min;
        }
      }
      
      // Dilation
      const dilated = new Float32Array(width * height);
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          let max = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const idx = (y + dy) * width + (x + dx);
              max = Math.max(max, eroded[idx]);
            }
          }
          dilated[y * width + x] = max;
        }
      }
      
      result = dilated;
    }
    
    return result;
  }
  
  applyAlphaMatting(originalImage, mask, bgColor) {
    const width = originalImage.width;
    const height = originalImage.height;
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width;
    tempCanvas.height = height;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(originalImage, 0, 0, width, height);
    const imageData = tempCtx.getImageData(0, 0, width, height);
    
    const output = tempCtx.createImageData(width, height);
    
    let bgR = 255, bgG = 255, bgB = 255;
    if (bgColor !== 'transparent') {
      const rgb = this.hexToRgb(bgColor);
      bgR = rgb.r; bgG = rgb.g; bgB = rgb.b;
    }
    
    for (let i = 0; i < width * height; i++) {
      let alpha = Math.min(1, Math.max(0, mask[i]));
      
      // Adaptive alpha curve based on edge strength
      const edgeStrength = this.getEdgeStrength(imageData, i, width);
      if (edgeStrength > 50) {
        alpha = Math.pow(alpha, 0.5); // Preserve edges
      } else {
        alpha = Math.pow(alpha, 0.8);
      }
      
      const invAlpha = 1 - alpha;
      output.data[i * 4] = imageData.data[i * 4] * alpha + bgR * invAlpha;
      output.data[i * 4 + 1] = imageData.data[i * 4 + 1] * alpha + bgG * invAlpha;
      output.data[i * 4 + 2] = imageData.data[i * 4 + 2] * alpha + bgB * invAlpha;
      output.data[i * 4 + 3] = bgColor === 'transparent' ? Math.round(alpha * 255) : 255;
    }
    
    tempCtx.putImageData(output, 0, 0);
    return tempCanvas;
  }
  
  getEdgeStrength(imageData, index, width) {
    const x = index % width;
    const y = Math.floor(index / width);
    if (x < 2 || x >= width - 2 || y < 2 || y >= imageData.height - 2) return 0;
    
    const idx = index * 4;
    const gx = Math.abs(imageData.data[idx] - imageData.data[idx - 8]) +
               Math.abs(imageData.data[idx + 1] - imageData.data[idx - 7]) +
               Math.abs(imageData.data[idx + 2] - imageData.data[idx - 6]);
    const gy = Math.abs(imageData.data[idx] - imageData.data[idx - width * 4 * 2]) +
               Math.abs(imageData.data[idx + 1] - imageData.data[idx + 1 - width * 4 * 2]) +
               Math.abs(imageData.data[idx + 2] - imageData.data[idx + 2 - width * 4 * 2]);
    
    return (gx + gy) / 3;
  }
  
  removeNoise(canvas) {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const width = canvas.width;
    const height = canvas.height;
    
    // Median filter for salt-and-pepper noise
    const filtered = new Uint8ClampedArray(imageData.data);
    
    for (let y = 1; y < height - 1; y++) {
      for (let x = 1; x < width - 1; x++) {
        const idx = (y * width + x) * 4;
        
        // Check if pixel is likely noise (isolated)
        let neighbors = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nidx = ((y + dy) * width + (x + dx)) * 4;
            if (Math.abs(imageData.data[nidx] - imageData.data[idx]) < 30) {
              neighbors++;
            }
          }
        }
        
        if (neighbors < 2) {
          // Apply median filter
          const values = [];
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const nidx = ((y + dy) * width + (x + dx)) * 4;
              values.push(imageData.data[nidx]);
              values.push(imageData.data[nidx + 1]);
              values.push(imageData.data[nidx + 2]);
            }
          }
          values.sort((a,b) => a - b);
          const median = values[Math.floor(values.length / 2)];
          filtered[idx] = median;
          filtered[idx + 1] = median;
          filtered[idx + 2] = median;
        }
      }
    }
    
    ctx.putImageData(new ImageData(filtered, width, height), 0, 0);
    return canvas;
  }
  
  edgeBasedRemoval(canvas, bgColor) {
    // Smart edge detection + flood fill from corners
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const imageData = ctx.getImageData(0, 0, width, height);
    
    // Simple background detection (flood fill from corners)
    const visited = new Uint8Array(width * height);
    const queue = [];
    
    // Start from all four corners
    queue.push(0, width-1, (height-1)*width, (height-1)*width + width-1);
    
    const tolerance = 30;
    
    while (queue.length) {
      const idx = queue.shift();
      if (visited[idx]) continue;
      visited[idx] = 1;
      
      const x = idx % width;
      const y = Math.floor(idx / width);
      const pixelIdx = idx * 4;
      
      // Check if similar to background
      const isBackground = 
        Math.abs(imageData.data[pixelIdx] - 255) < tolerance &&
        Math.abs(imageData.data[pixelIdx+1] - 255) < tolerance &&
        Math.abs(imageData.data[pixelIdx+2] - 255) < tolerance;
      
      if (isBackground) {
        // Add neighbors
        if (x > 0) queue.push(idx - 1);
        if (x < width-1) queue.push(idx + 1);
        if (y > 0) queue.push(idx - width);
        if (y < height-1) queue.push(idx + width);
      }
    }
    
    // Apply mask
    const output = ctx.createImageData(width, height);
    let bgR = 255, bgG = 255, bgB = 255;
    if (bgColor !== 'transparent') {
      const rgb = this.hexToRgb(bgColor);
      bgR = rgb.r; bgG = rgb.g; bgB = rgb.b;
    }
    
    for (let i = 0; i < width * height; i++) {
      const alpha = visited[i] ? 0 : 1;
      if (bgColor === 'transparent') {
        output.data[i*4] = imageData.data[i*4];
        output.data[i*4+1] = imageData.data[i*4+1];
        output.data[i*4+2] = imageData.data[i*4+2];
        output.data[i*4+3] = alpha * 255;
      } else {
        output.data[i*4] = imageData.data[i*4] * alpha + bgR * (1-alpha);
        output.data[i*4+1] = imageData.data[i*4+1] * alpha + bgG * (1-alpha);
        output.data[i*4+2] = imageData.data[i*4+2] * alpha + bgB * (1-alpha);
        output.data[i*4+3] = 255;
      }
    }
    
    ctx.putImageData(output, 0, 0);
    return canvas;
  }
  
  hexToRgb(hex) {
    if (hex === 'transparent') return { r: 255, g: 255, b: 255 };
    return {
      r: parseInt(hex.slice(1,3), 16),
      g: parseInt(hex.slice(3,5), 16),
      b: parseInt(hex.slice(5,7), 16)
    };
  }
}

const bgRemover = new AdvancedBackgroundRemoval();

// ============ IMAGE PROCESSING ============

async function processImage(file, method, bgColor, enhance) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const img = new Image();
      img.onload = async () => {
        try {
          let result;
          
          if (method === 'api') {
            // Try API first
            const apiResult = await removeBgWithAPI(e.target.result);
            if (apiResult) {
              result = await loadImageFromURL(apiResult);
            } else {
              result = await bgRemover.removeBackground(img, bgColor);
            }
          } else {
            // Use local advanced processing
            result = await bgRemover.removeBackground(img, bgColor);
          }
          
          // Apply auto-enhance if enabled
          if (enhance) {
            result = autoEnhance(result);
          }
          
          resolve({
            original: img,
            processed: result,
            name: file.name
          });
        } catch(err) {
          reject(err);
        }
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function autoEnhance(canvas) {
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  // Auto levels and contrast
  let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
  
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] > 128) { // Only consider foreground pixels
      minR = Math.min(minR, data[i]);
      maxR = Math.max(maxR, data[i]);
      minG = Math.min(minG, data[i+1]);
      maxG = Math.max(maxG, data[i+1]);
      minB = Math.min(minB, data[i+2]);
      maxB = Math.max(maxB, data[i+2]);
    }
  }
  
  // Apply auto levels
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] > 128) {
      data[i] = Math.min(255, Math.max(0, (data[i] - minR) * 255 / (maxR - minR)));
      data[i+1] = Math.min(255, Math.max(0, (data[i+1] - minG) * 255 / (maxG - minG)));
      data[i+2] = Math.min(255, Math.max(0, (data[i+2] - minB) * 255 / (maxB - minB)));
    }
  }
  
  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

// ============ UI HELPERS ============

function dataURLtoBlob(dataURL) {
  const arr = dataURL.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) {
    u8arr[n] = bstr.charCodeAt(n);
  }
  return new Blob([u8arr], { type: mime });
}

function loadImageFromURL(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      resolve(canvas);
    };
    img.onerror = reject;
    img.src = url;
  });
}

function addToGallery(item) {
  const grid = document.getElementById('photoGrid');
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="card-imgs">
      <div class="cimg-wrap"><img src="${item.original.src}" alt="original"></div>
      <div class="cimg-wrap"><img src="${item.processed.toDataURL()}" alt="processed"></div>
    </div>
    <div class="card-foot">
      <span style="flex:1;font-size:11px;color:#888">${item.name.substring(0, 30)}</span>
      <button class="card-del" onclick="deletePhoto(${currentImages.length})">✕</button>
    </div>
  `;
  grid.appendChild(card);
  currentImages.push(item);
  document.getElementById('actionBar').style.display = 'flex';
}

function deletePhoto(index) {
  currentImages.splice(index, 1);
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  currentImages.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `
      <div class="card-imgs">
        <div class="cimg-wrap"><img src="${item.original.src}" alt="original"></div>
        <div class="cimg-wrap"><img src="${item.processed.toDataURL()}" alt="processed"></div>
      </div>
      <div class="card-foot">
        <span style="flex:1;font-size:11px;color:#888">${item.name.substring(0, 30)}</span>
        <button class="card-del" onclick="deletePhoto(${idx})">✕</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function clearAll() {
  currentImages = [];
  renderGallery();
  document.getElementById('actionBar').style.display = 'none';
  toast('Cleared all', 'info');
}

async function downloadZIP() {
  if (!currentImages.length) return;
  toast('Creating ZIP...', 'info');
  const JSZip = window.JSZip;
  const zip = new JSZip();
  
  for (let i = 0; i < currentImages.length; i++) {
    const dataURL = currentImages[i].processed.toDataURL('image/png');
    const base64 = dataURL.split(',')[1];
    zip.file(`photo_${i+1}.png`, base64, { base64: true });
  }
  
  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'background_removed.zip';
  link.click();
  toast('ZIP downloaded!', 'success');
}

async function downloadAllAsPNG() {
  for (let i = 0; i < currentImages.length; i++) {
    const link = document.createElement('a');
    link.download = `photo_${i+1}_nobg.png`;
    link.href = currentImages[i].processed.toDataURL('image/png');
    link.click();
    await new Promise(r => setTimeout(r, 100));
  }
  toast(`Downloaded ${currentImages.length} photos`, 'success');
}

// File handling
async function handleFiles(files) {
  const method = document.getElementById('methodSelect').value;
  const bgColor = document.getElementById('bgSelect').value;
  const enhance = document.getElementById('enhanceBtn').classList.contains('on');
  
  const procBar = document.getElementById('procBar');
  const progFill = document.getElementById('progFill');
  procBar.classList.add('active');
  
  for (let i = 0; i < files.length; i++) {
    progFill.style.width = `${(i / files.length) * 100}%`;
    try {
      const result = await processImage(files[i], method, bgColor, enhance);
      addToGallery(result);
      toast(`Processed: ${files[i].name}`, 'success');
    } catch(err) {
      console.error(err);
      toast(`Failed: ${files[i].name}`, 'error');
    }
  }
  
  procBar.classList.remove('active');
  progFill.style.width = '0%';
}

function toast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Event listeners
document.getElementById('uploadZone').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
document.getElementById('uploadZone').addEventListener('dragover', (e) => {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#e09a2a';
});
document.getElementById('uploadZone').addEventListener('dragleave', (e) => {
  e.currentTarget.style.borderColor = '#252529';
});
document.getElementById('uploadZone').addEventListener('drop', async (e) => {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#252529';
  const files = Array.from(e.dataTransfer.files);
  await handleFiles(files);
});
document.getElementById('fileInput').addEventListener('change', async (e) => {
  await handleFiles(Array.from(e.target.files));
  e.target.value = '';
});
document.getElementById('enhanceBtn').addEventListener('click', function() {
  this.classList.toggle('on');
});

// Initialize
initModel();
</script>
