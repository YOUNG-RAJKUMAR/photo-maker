<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0A0A0F; --panel: #111118; --card: #1A1A24; --border: #2A2A35;
    --amber: #F5A623; --amber-glow: rgba(245,166,35,0.12); --green: #2ecc71;
    --red: #e74c3c; --blue: #3498db; --text: #F0F0F5; --muted: #7F8C8D;
    --ff: 'Inter', sans-serif; --fm: 'Space Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--ff); overflow-x: hidden; }
  header { position: sticky; top: 0; z-index: 200; background: rgba(10,10,15,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, #F5A623, #E67E22); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .logo span { font-weight: 400; color: var(--muted); background: none; -webkit-background-clip: unset; }
  .badge-group { display: flex; gap: 8px; margin-left: auto; }
  .badge { font-family: var(--fm); font-size: 9px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .badge.ok { border-color: var(--green); color: var(--green); background: rgba(46,204,113,0.08); }
  .badge.warn { border-color: var(--amber); color: var(--amber); background: rgba(245,166,35,0.08); }
  .toolbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .tog-group { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 48px; border: 1px solid var(--border); }
  .tog { background: transparent; border: none; font-family: var(--fm); font-size: 10px; text-transform: uppercase; padding: 6px 14px; border-radius: 32px; cursor: pointer; color: var(--muted); transition: all 0.2s; font-weight: 600; letter-spacing: 0.03em; }
  .tog.on { background: var(--amber); color: #000; box-shadow: 0 2px 6px rgba(245,166,35,0.3); }
  .tog.feature { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--amber); }
  .tog.feature.on { background: var(--amber); color: #000; }
  select, .num-input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--fm); font-size: 11px; padding: 6px 12px; border-radius: 24px; cursor: pointer; outline: none; }
  .divider { width: 1px; height: 26px; background: var(--border); margin: 0 4px; }
  main { max-width: 1400px; margin: 0 auto; padding: 28px; }
  .upload-zone { border: 2px dashed var(--border); border-radius: 24px; background: var(--panel); padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 32px; }
  .upload-zone.drag-over { border-color: var(--amber); background: var(--amber-glow); }
  .up-icon { font-size: 48px; margin-bottom: 12px; }
  .up-title { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
  .up-btn { background: var(--amber); color: #000; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 700; margin-top: 18px; cursor: pointer; transition: 0.15s; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; margin-top: 20px; }
  .photo-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s; }
  .card-imgs { display: flex; gap: 1px; background: #000; }
  .cimg-wrap { flex: 1; position: relative; aspect-ratio: 35/45; background: #1a1a1a; }
  .cimg-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .cimg-label { position: absolute; bottom: 6px; left: 6px; font-size: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 12px; font-family: var(--fm); }
  .card-foot { padding: 10px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-top: 1px solid var(--border); }
  .tag { font-size: 8px; padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.05); font-family: var(--fm); }
  .tag.face { color: var(--green); border: 1px solid var(--green); }
  .tag.enh { background: var(--amber); color: #000; border: none; }
  .a4-preview { background: #fff; width: 100%; max-width: 620px; margin: 0 auto; border-radius: 12px; padding: 20px; display: flex; flex-wrap: wrap; gap: 6px; box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
  .btn { padding: 10px 22px; border-radius: 40px; font-weight: 600; cursor: pointer; background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-primary { background: var(--amber); color: #000; border: none; }
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e1e2a; border-left: 4px solid var(--amber); padding: 12px 20px; border-radius: 12px; font-family: var(--fm); font-size: 12px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 9999; }
  @media print { body > *:not(#printSheet) { display: none; } #printSheet { display: block; } .print-page { page-break-after: always; } }

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ---------- AI MODELS ----------
let blazeModel = null;
let segmenter = null;
async function initModels() {
  try { await tf.setBackend('wasm'); await tf.ready(); } catch(e) { await tf.setBackend('cpu'); }
  try { blazeModel = await blazeface.load(); document.getElementById('faceStatus').innerHTML = '✅ FACE AI'; document.getElementById('faceStatus').className = 'badge ok'; } catch(e){ document.getElementById('faceStatus').innerHTML = '⚠️ SMART CROP'; }
  try { const model = bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation; segmenter = await bodySegmentation.createSegmenter(model, { runtime: 'tfjs', modelType: 'general' }); document.getElementById('bgStatus').innerHTML = '✅ BG READY'; document.getElementById('bgStatus').className = 'badge ok'; } catch(e){ document.getElementById('bgStatus').innerHTML = '⚠️ BG FALLBACK'; }
}
initModels();

// ---------- PRESETS ----------
const PRESETS = { nepal:{w:35,h:45,label:'🇳🇵 Nepal 35x45'}, india:{w:35,h:45,label:'🇮🇳 India 35x45'}, usa:{w:51,h:51,label:'🇺🇸 USA 2x2in'}, uk:{w:35,h:45,label:'🇬🇧 UK 35x45'}, schengen:{w:35,h:45,label:'🇪🇺 Schengen'}, canada:{w:50,h:70,label:'🇨🇦 Canada 50x70'}, japan:{w:35,h:45,label:'🇯🇵 Japan'}, custom:{w:50,h:50,label:'✏️ Custom 50x50'} };
const presetSelect = document.getElementById('presetSelect');
for (const [k,v] of Object.entries(PRESETS)) { let opt = document.createElement('option'); opt.value=k; opt.innerText=v.label; presetSelect.appendChild(opt); } presetSelect.value='nepal';

// STATE
let photos = [];  // { id, name, sourceDataURL, processedURL, faceDetected, bgRemoved }
let processing = false;
const S = { autoFaceEnhancer: true, removeOtherEnhancing: true, preset:'nepal', dpi:300, bgColor:'#ffffff', copies:6 };
// toggles
const autoFaceBtn = document.getElementById('autoFaceEnhancerBtn');
const removeOtherBtn = document.getElementById('removeOtherEnhBtn');
autoFaceBtn.addEventListener('click', () => { S.autoFaceEnhancer = !S.autoFaceEnhancer; autoFaceBtn.classList.toggle('on', S.autoFaceEnhancer); reprocessAll(); });
removeOtherBtn.addEventListener('click', () => { S.removeOtherEnhancing = !S.removeOtherEnhancing; removeOtherBtn.classList.toggle('on', S.removeOtherEnhancing); reprocessAll(); });
presetSelect.addEventListener('change', (e) => { S.preset = e.target.value; reprocessAll(); });
document.getElementById('bgColorSelect').addEventListener('change', e => { S.bgColor = e.target.value; reprocessAll(); });
document.getElementById('dpiSelect').addEventListener('change', e => { S.dpi = parseInt(e.target.value); reprocessAll(); });
document.getElementById('copiesVal').addEventListener('input', (e) => { S.copies = Math.max(1, parseInt(e.target.value)||6); buildPrintPreview(); buildPrintSheets(); });

// helpers
function canvasToDataURL(canvas, quality=0.92) { return canvas.toDataURL('image/jpeg', quality); }
function loadImageCanvas(file) { return new Promise((res,rej)=>{ let img=new Image(), url=URL.createObjectURL(file); img.onload=()=>{ let c=document.createElement('canvas'); c.width=img.width; c.height=img.height; c.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(url); res(c); }; img.onerror=rej; img.src=url; }); }
async function renderPDF(file) { let ab=await file.arrayBuffer(); let pdf=await pdfjsLib.getDocument({data:ab}).promise; let page=await pdf.getPage(1); let viewport=page.getViewport({scale:2.2}); let c=document.createElement('canvas'); c.width=viewport.width; c.height=viewport.height; await page.render({canvasContext:c.getContext('2d'),viewport}).promise; return c; }
function dataURLtoCanvas(url) { return new Promise(res=>{ let img=new Image(); img.onload=()=>{ let c=document.createElement('canvas'); c.width=img.width; c.height=img.height; c.getContext('2d').drawImage(img,0,0); res(c); }; img.src=url; }); }

// ---------- PROFESSIONAL BACKGROUND REMOVAL (AI) ----------
async function removeBackgroundWithAI(srcCanvas) {
  if (!segmenter || !S.autoFaceEnhancer) return srcCanvas;
  try {
    let small = document.createElement('canvas'); let ratio = Math.min(640/srcCanvas.width, 640/srcCanvas.height); small.width = Math.floor(srcCanvas.width*ratio); small.height = Math.floor(srcCanvas.height*ratio);
    small.getContext('2d').drawImage(srcCanvas, 0, 0, small.width, small.height);
    const seg = await segmenter.segmentPeople(small, { flattenMasks: false });
    if (!seg || seg.length===0) return srcCanvas;
    let mask = seg[0].mask; let maskData = await mask.toImageData(); let w = maskData.width, h = maskData.height;
    let outputCanvas = document.createElement('canvas'); outputCanvas.width = srcCanvas.width; outputCanvas.height = srcCanvas.height;
    let ctxOut = outputCanvas.getContext('2d'); ctxOut.drawImage(srcCanvas, 0, 0);
    let imgData = ctxOut.getImageData(0,0,srcCanvas.width,srcCanvas.height);
    let bgRGB = { r:255,g:255,b:255 }; if(S.bgColor !== '#ffffff'){ let rgb = parseInt(S.bgColor.slice(1),16); bgRGB.r = (rgb>>16)&255; bgRGB.g = (rgb>>8)&255; bgRGB.b = rgb&255; }
    for (let y=0; y<h; y++) { for (let x=0; x<w; x++) { let maskVal = maskData.data[(y*w+x)*4] / 255; if (maskVal < 0.4) { let sx = Math.floor(x/ratio), sy = Math.floor(y/ratio); let idx = (sy*srcCanvas.width + sx)*4; imgData.data[idx] = bgRGB.r; imgData.data[idx+1] = bgRGB.g; imgData.data[idx+2] = bgRGB.b; } } }
    ctxOut.putImageData(imgData,0,0); return outputCanvas;
  } catch(e) { console.warn(e); return srcCanvas; }
}

// ---------- ADVANCED FACE ENHANCER: SKIN TONE · COLOR · HDR · SMOOTH HD ----------
async function detectFaceRegion(canvas) {
  if (!blazeModel) return null;
  try { let faces = await blazeModel.estimateFaces(canvas, false); if(faces.length) return faces[0]; } catch(e) {}
  return null;
}
// Skin tone normalization (selective color balance based on face skin)
function applySkinToneAndColor(canvas, faceBox) {
  let ctx = canvas.getContext('2d', { willReadFrequently: true });
  let w = canvas.width, h = canvas.height; let img = ctx.getImageData(0,0,w,h); let data = img.data;
  // Face region average for skin tone
  let skinR=0, skinG=0, skinB=0, skinPixels=0;
  if (faceBox && faceBox.topLeft && faceBox.bottomRight) {
    let [x1,y1] = faceBox.topLeft, [x2,y2] = faceBox.bottomRight; x1 = Math.max(0,Math.floor(x1)); y1 = Math.max(0,Math.floor(y1)); x2 = Math.min(w,Math.ceil(x2)); y2 = Math.min(h,Math.ceil(y2));
    for (let y=y1; y<y2; y++) { for (let x=x1; x<x2; x++) { let idx = (y*w+x)*4; let r=data[idx],g=data[idx+1],b=data[idx+2]; if(r>50 && g>30 && b>20 && Math.abs(r-g)<60) { skinR+=r; skinG+=g; skinB+=b; skinPixels++; } } }
  }
  if (skinPixels > 0) { skinR /= skinPixels; skinG /= skinPixels; skinB /= skinPixels; }
  let targetR=215, targetG=165, targetB=135; // warm balanced skin tone
  let adjustR = (skinPixels>0) ? targetR/skinR : 1.05; let adjustG = (skinPixels>0) ? targetG/skinG : 1.02; let adjustB = (skinPixels>0) ? targetB/skinB : 0.98;
  for (let i=0; i<data.length; i+=4) {
    let r=data[i], g=data[i+1], b=data[i+2];
    let yVal = 0.299*r + 0.587*g + 0.114*b;
    let isSkinPixel = (r>70 && g>40 && b>30 && Math.abs(r-g)<75 && r>g*0.6);
    if (isSkinPixel || skinPixels>0) {
      data[i] = Math.min(245, Math.max(70, r * adjustR));
      data[i+1] = Math.min(235, Math.max(60, g * adjustG));
      data[i+2] = Math.min(220, Math.max(50, b * adjustB));
    }
    // Color vibrance globally
    let avg = (data[i]+data[i+1]+data[i+2])/3;
    let satBoost = 1.18;
    data[i] = Math.min(255, data[i] + (data[i]-avg)*0.22);
    data[i+1] = Math.min(255, data[i+1] + (data[i+1]-avg)*0.18);
    data[i+2] = Math.min(255, data[i+2] + (data[i+2]-avg)*0.20);
  }
  ctx.putImageData(img,0,0);
  return canvas;
}
// HDR effect: local contrast + shadow/highlight + clarity
function applyHDRClarity(canvas) {
  let ctx = canvas.getContext('2d'); let w=canvas.width, h=canvas.height; let imgData = ctx.getImageData(0,0,w,h); let data = imgData.data;
  let lum = new Float32Array(w*h);
  for (let i=0; i<data.length; i+=4) lum[i/4] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
  let contrastMap = new Float32Array(w*h);
  let radius = 3; let rad = radius;
  for (let y=0; y<h; y++) { for (let x=0; x<w; x++) { let idx = y*w+x; let localSum=0, cnt=0; for (let dy=-rad; dy<=rad; dy++) { for (let dx=-rad; dx<=rad; dx++) { let nx=x+dx, ny=y+dy; if(nx>=0 && nx<w && ny>=0 && ny<h) { localSum += lum[ny*w+nx]; cnt++; } } } let localAvg = localSum/cnt; let diff = lum[idx] - localAvg; contrastMap[idx] = diff * 1.6; } }
  for (let i=0; i<data.length; i+=4) {
    let idx = i/4; let newLum = lum[idx] + contrastMap[idx]; newLum = Math.min(245, Math.max(20, newLum));
    let factor = newLum / (lum[idx]+0.001);
    data[i] = Math.min(255, data[i] * factor * 1.02);
    data[i+1] = Math.min(255, data[i+1] * factor * 1.01);
    data[i+2] = Math.min(255, data[i+2] * factor);
  }
  ctx.putImageData(imgData,0,0);
  return canvas;
}
// Smooth HD: Bilateral-like edge-aware smoothing + crisp sharpness
function applySmoothHD(canvas) {
  let ctx = canvas.getContext('2d'); let w=canvas.width, h=canvas.height; let img = ctx.getImageData(0,0,w,h); let data = img.data; let temp = new Uint8ClampedArray(data);
  for (let y=2; y<h-2; y++) { for (let x=2; x<w-2; x++) { let idx = (y*w+x)*4; let isEdge = false; for (let c=0;c<3;c++) { let grad = Math.abs(data[idx+c] - data[idx-4+c]) + Math.abs(data[idx+c] - data[idx-w*4+c]); if(grad>35) { isEdge=true; break; } }
    if(!isEdge) { let r=0,g=0,b=0,count=0; for (let dy=-1; dy<=1; dy++) { for (let dx=-1; dx<=1; dx++) { let nidx = ((y+dy)*w+(x+dx))*4; r+=data[nidx]; g+=data[nidx+1]; b+=data[nidx+2]; count++; } } temp[idx] = (data[idx]*0.6) + (r/count)*0.4; temp[idx+1] = (data[idx+1]*0.6)+(g/count)*0.4; temp[idx+2] = (data[idx+2]*0.6)+(b/count)*0.4; } else { temp[idx]=data[idx]; temp[idx+1]=data[idx+1]; temp[idx+2]=data[idx+2]; } } }
  for (let i=0; i<data.length; i++) data[i] = temp[i];
  ctx.putImageData(img,0,0);
  // Unsharp mask for HD crispness
  let sharpImg = ctx.getImageData(0,0,w,h); let sharpData = sharpImg.data; let blur = new Uint8ClampedArray(sharpData.length);
  for (let y=1; y<h-1; y++) for (let x=1; x<w-1; x++) { let idx = (y*w+x)*4; for (let c=0;c<3;c++) blur[idx+c] = (sharpData[idx-4+c]+sharpData[idx+4+c]+sharpData[idx-w*4+c]+sharpData[idx+w*4+c])/4; }
  for (let i=0; i<sharpData.length; i+=4) { for (let c=0;c<3;c++) { let val = sharpData[i+c] + 0.85 * (sharpData[i+c] - blur[i+c]); sharpData[i+c] = Math.min(255, Math.max(0, val)); } }
  ctx.putImageData(sharpImg,0,0);
  return canvas;
}

// MAIN ENHANCE PIPELINE (auto face enhancer + optional remove other)
async function fullFaceEnhancePipeline(croppedCanvas, originalCanvasForFace) {
  let canvas = croppedCanvas; // already cropped passport
  let face = await detectFaceRegion(canvas);
  if (S.autoFaceEnhancer) {
    // 1) Skin tone + color vibrancy
    canvas = applySkinToneAndColor(canvas, face);
    // 2) HDR / local contrast
    canvas = applyHDRClarity(canvas);
    // 3) Smooth HD (skin smoothing + crisp)
    canvas = applySmoothHD(canvas);
  }
  // If removeOtherEnhancing is OFF, we skip additional legacy enhancements; otherwise we respect user
  if (!S.removeOtherEnhancing) {
    // optional legacy enhancements off (nothing added)
  }
  return canvas;
}

// CROP to passport + BG removal + ENHANCE
async function processSingleImage(srcCanvas) {
  let withBgRemoved = srcCanvas;
  if (S.autoFaceEnhancer && segmenter) { try { withBgRemoved = await removeBackgroundWithAI(srcCanvas); } catch(e){} }
  let faceDetectedFlag = false;
  let detection = await detectFaceRegion(withBgRemoved);
  faceDetectedFlag = !!detection;
  let preset = PRESETS[S.preset];
  let mmToPx = (mm) => Math.round(mm / 25.4 * S.dpi);
  let targetW = mmToPx(preset.w), targetH = mmToPx(preset.h);
  let cropCanvas = document.createElement('canvas'); cropCanvas.width = targetW; cropCanvas.height = targetH;
  let ctx = cropCanvas.getContext('2d'); ctx.fillStyle = S.bgColor; ctx.fillRect(0,0,targetW,targetH);
  if (detection) {
    let [x1,y1] = detection.topLeft, [x2,y2] = detection.bottomRight;
    let faceH = y2-y1; let crownY = y1 - faceH*0.35; let chinY = y2 + faceH*0.05;
    let headH = chinY - crownY; let targetHeadH = targetH * 0.72;
    let scale = targetHeadH / headH; let srcPhotoW = targetW / scale, srcPhotoH = targetH / scale;
    let srcX = Math.max(0, Math.min(withBgRemoved.width - srcPhotoW, (x1+x2)/2 - srcPhotoW/2));
    let srcY = crownY - (targetH*0.08/scale);
    ctx.drawImage(withBgRemoved, srcX, srcY, srcPhotoW, srcPhotoH, 0, 0, targetW, targetH);
  } else {
    let sw = withBgRemoved.width, sh = withBgRemoved.height; let ratio = Math.min(targetW/sw, targetH/sh);
    let dw = sw*ratio, dh = sh*ratio; let dx = (targetW-dw)/2, dy = (targetH-dh)*0.12;
    ctx.drawImage(withBgRemoved, dx, dy, dw, dh);
  }
  // FINAL ENHANCE
  let finalCanvas = await fullFaceEnhancePipeline(cropCanvas, withBgRemoved);
  return { finalCanvas, faceDetected: faceDetectedFlag, bgRemoved: !!segmenter && S.autoFaceEnhancer };
}

// ---------- FILE HANDLER ----------
async function handleFiles(files) {
  if (processing) return; processing = true;
  let procDiv = document.getElementById('procIndicator'); procDiv.style.display = 'block'; let progFill = document.getElementById('progressFill'); let procMsg = document.getElementById('procMsg');
  for (let i=0; i<files.length; i++) {
    let f = files[i]; procMsg.innerText = `📸 ${f.name}`; progFill.style.width = `${(i/files.length)*80}%`;
    try {
      let srcCanvas = f.type === 'application/pdf' ? await renderPDF(f) : await loadImageCanvas(f);
      let sourceDataURL = canvasToDataURL(srcCanvas, 0.9);
      let { finalCanvas, faceDetected, bgRemoved } = await processSingleImage(srcCanvas);
      let processedURL = canvasToDataURL(finalCanvas, 0.95);
      photos.push({ id: Date.now()+Math.random(), name: f.name, sourceDataURL, processedURL, faceDetected, bgRemoved });
    } catch(e) { console.warn(e); toast(`Error: ${f.name}`, 'error'); }
  }
  progFill.style.width = '100%'; procMsg.innerText = 'Ready!'; setTimeout(()=>{ procDiv.style.display='none'; }, 1000);
  renderGallery(); showUI(); reprocessAll = reprocessAll; processing=false;
}
async function reprocessAll() {
  if (!photos.length) return;
  let newPhotos = [];
  for (let p of photos) {
    let srcCanvas = await dataURLtoCanvas(p.sourceDataURL);
    let { finalCanvas, faceDetected, bgRemoved } = await processSingleImage(srcCanvas);
    newPhotos.push({ ...p, processedURL: canvasToDataURL(finalCanvas,0.95), faceDetected, bgRemoved });
  }
  photos = newPhotos; renderGallery(); buildPrintPreview(); buildPrintSheets(); toast('Face enhancer reapplied ✓','success');
}
function renderGallery() {
  let grid = document.getElementById('photoGrid'); grid.innerHTML = '';
  photos.forEach(p => {
    let card = document.createElement('div'); card.className = 'photo-card';
    card.innerHTML = `<div class="card-imgs"><div class="cimg-wrap"><img src="${p.sourceDataURL}" alt="original"><span class="cimg-label">ORIGINAL</span></div><div class="cimg-wrap"><img src="${p.processedURL}" alt="enhanced"><span class="cimg-label" style="background:var(--amber);color:#000;">ENHANCED</span></div></div><div class="card-foot"><span class="tag face">${p.faceDetected?'🎯 FACE AI':'📐 AUTO'}</span>${p.bgRemoved?'<span class="tag" style="border-color:#3498db;">✂️ BG</span>':''}<span style="flex:1; font-size:10px; overflow:hidden;">${p.name}</span><button class="delPhotoBtn" data-id="${p.id}" style="background:none; border:none; color:var(--muted); cursor:pointer;">🗑️</button></div>`;
    grid.appendChild(card);
  });
  document.querySelectorAll('.delPhotoBtn').forEach(btn => btn.addEventListener('click', (e) => { let id = parseFloat(btn.dataset.id); photos = photos.filter(p=>p.id!==id); renderGallery(); if(!photos.length) hideUI(); else { buildPrintPreview(); buildPrintSheets(); } }));
  document.getElementById('photoCount').innerText = `${photos.length} photo${photos.length!==1?'s':''}`;
}
function buildPrintPreview() {
  let container = document.getElementById('a4PreviewContainer'); if(!photos.length) return; container.innerHTML='';
  let preset = PRESETS[S.preset]; let pageW = 540, gap=6, cols=4; let photoW = Math.floor((pageW-(cols-1)*gap)/cols); let photoH = Math.round(photoW * preset.h/preset.w);
  let copies = S.copies; let all = []; photos.forEach(p=>{ for(let i=0;i<copies;i++) all.push(p.processedURL); });
  all.slice(0,36).forEach(url=>{ let img = document.createElement('img'); img.src=url; img.style.width=photoW+'px'; img.style.height=photoH+'px'; img.style.objectFit='cover'; img.style.borderRadius='4px'; container.appendChild(img); });
}
function buildPrintSheets() { let sheetDiv = document.getElementById('printSheet'); sheetDiv.innerHTML=''; if(!photos.length) return; let preset=PRESETS[S.preset]; let gap_mm=3, pageW_mm=200, pageH_mm=287; let maxCols = 4; let perPage = 16; let copies = S.copies; let allImages=[]; photos.forEach(p=>{ for(let i=0;i<copies;i++) allImages.push(p.processedURL); });
  for(let i=0;i<allImages.length;i+=perPage){ let page=document.createElement('div'); page.className='print-page'; page.style.cssText='width:210mm; min-height:297mm; padding:5mm; display:flex; flex-wrap:wrap; gap:3mm; background:white;'; let slice=allImages.slice(i,i+perPage); slice.forEach(src=>{ let img=document.createElement('img'); img.src=src; img.style.width=`${preset.w}mm`; img.style.height=`${preset.h}mm`; img.style.objectFit='cover'; page.appendChild(img); }); sheetDiv.appendChild(page); } }
function showUI() { document.getElementById('gallerySection').style.display='block'; document.getElementById('previewArea').style.display='block'; document.getElementById('actionPanel').style.display='flex'; buildPrintPreview(); buildPrintSheets(); }
function hideUI() { document.getElementById('gallerySection').style.display='none'; document.getElementById('previewArea').style.display='none'; document.getElementById('actionPanel').style.display='none'; }
function toast(msg,type=''){ let t=document.getElementById('toast'); t.innerText=msg; t.style.opacity='1'; t.style.borderLeftColor=type==='error'?'var(--red)':'var(--amber)'; setTimeout(()=>t.style.opacity='0',2300); }
document.getElementById('clearBtn').onclick=()=>{ photos=[]; renderGallery(); hideUI(); toast('All cleared',''); };
document.getElementById('zipBtn').onclick=async()=>{ if(!photos.length) return; let zip=new JSZip(); let folder=zip.folder('enhanced_faces'); photos.forEach((p,i)=>folder.file(`face_${i+1}.jpg`, p.processedURL.split(',')[1], {base64:true})); let blob=await zip.generateAsync({type:'blob'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='neural_enhanced.zip'; a.click(); toast('ZIP ready ✓',''); };
document.getElementById('printBtn').onclick=()=>{ if(!photos.length) return; buildPrintSheets(); window.print(); };
document.getElementById('uploadZone').addEventListener('click', (e)=>{ if(!e.target.classList.contains('up-btn')) document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', (e)=>handleFiles(Array.from(e.target.files)));
document.getElementById('uploadZone').addEventListener('dragover', e=>{ e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over'); });
document.getElementById('uploadZone').addEventListener('dragleave', e=>document.getElementById('uploadZone').classList.remove('drag-over'));
document.getElementById('uploadZone').addEventListener('drop', e=>{ e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag-over'); handleFiles(Array.from(e.dataTransfer.files)); });
window.reprocessAll = reprocessAll;
</script>
