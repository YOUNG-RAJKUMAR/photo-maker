<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioSnap — Professional Background Removal (remove.bg Quality)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080809;--panel:#101013;--card:#17171b;--border:#252529;--border2:#333339;
  --amber:#e09a2a;--amber-d:rgba(224,154,42,0.10);--red:#d63031;--green:#00b894;--blue:#0984e3;
  --text:#ede8e0;--muted:#66667a;--sub:#44445a;
  --ff:'Bebas Neue',sans-serif;--fm:'Space Mono',monospace;--fb:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
header{position:sticky;top:0;z-index:200;height:58px;padding:0 28px;display:flex;align-items:center;gap:18px;background:rgba(8,8,9,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.logo{font-family:var(--ff);font-size:30px;letter-spacing:3px;color:var(--amber)}
.logo b{color:var(--text)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{font-family:var(--fm);font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--muted)}
.badge.ok{border-color:var(--green);color:var(--green)}
.badge.warn{border-color:var(--amber);color:var(--amber)}
.settings-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sg{display:flex;align-items:center;gap:8px}
.slabel{font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:uppercase}
select,button{background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:var(--fm);font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer}
.tog{padding:4px 10px;background:var(--card);color:var(--muted)}
.tog.on{background:var(--amber-d);border-color:var(--amber);color:var(--amber)}
main{max-width:1400px;margin:0 auto;padding:28px}
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:56px 28px;text-align:center;cursor:pointer;background:var(--panel);margin-bottom:32px;transition:all .2s}
.upload-zone.drag-over{border-color:var(--amber);background:rgba(224,154,42,.04)}
.up-title{font-family:var(--ff);font-size:30px;letter-spacing:3px;margin-bottom:6px}
.up-sub{font-family:var(--fm);font-size:10px;color:var(--muted);margin-bottom:24px}
.up-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;background:var(--amber);color:#000;font-family:var(--ff);font-size:17px;border:none;border-radius:5px;cursor:pointer}
#fileInput{display:none}
.proc-bar{display:none;margin-top:24px}
.proc-bar.active{display:block}
.proc-text{font-family:var(--fm);font-size:10px;color:var(--amber);margin-bottom:8px}
.prog-track{width:100%;max-width:320px;height:2px;background:var(--border);margin:0 auto;border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:var(--amber);width:0%;transition:width .25s}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:32px}
.photo-card{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:transform .2s}
.photo-card:hover{transform:translateY(-2px)}
.card-imgs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.cimg-wrap{position:relative;background:#000;overflow:hidden;aspect-ratio:35/45}
.cimg-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cimg-label{position:absolute;bottom:4px;left:4px;font-family:var(--fm);font-size:7px;padding:2px 5px;border-radius:2px;background:rgba(0,0,0,.75);color:var(--muted)}
.card-foot{padding:9px 12px;display:flex;align-items:center;gap:5px;border-top:1px solid var(--border)}
.card-name{flex:1;font-family:var(--fm);font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{font-family:var(--fm);font-size:7px;padding:2px 5px;border-radius:2px;border:1px solid var(--green);color:var(--green)}
.card-del{background:none;border:none;color:var(--sub);cursor:pointer;padding:2px 6px;border-radius:3px}
.card-del:hover{color:var(--red);background:rgba(214,48,49,.1)}
#actionBar{display:none;align-items:center;gap:12px;padding:20px 0;border-top:1px solid var(--border);flex-wrap:wrap}
.btn{padding:11px 22px;font-family:var(--ff);font-size:17px;letter-spacing:2px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.btn-ghost{background:var(--card);border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{color:var(--text)}
.btn-zip{background:var(--card);border:1px solid var(--border2);color:var(--text)}
.btn-zip:hover{border-color:var(--green);color:var(--green)}
.btn-print{background:var(--red);color:#fff}
.info-pill{margin-left:auto;font-family:var(--fm);font-size:9px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:20px}
#toast{position:fixed;bottom:24px;right:24px;z-index:9998;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:10px 18px;font-family:var(--fm);font-size:10px;transform:translateY(16px);opacity:0;transition:all .22s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<input type="file" id="fileInput" multiple accept="image/jpeg,image/jpg,image/png,image/webp">

<header>
  <div class="logo">STUDIO<b>SNAP</b></div>
  <div class="tagline" style="font-family:var(--fm);font-size:9px;color:var(--muted)">Professional BG Removal</div>
  <div class="hdr-right">
    <span class="badge ok" id="apiStatus">● API READY</span>
  </div>
</header>

<div class="settings-bar">
  <div class="sg"><span class="slabel">Background</span>
    <select id="bgColor">
      <option value="white">White</option>
      <option value="cream">Cream</option>
      <option value="lightblue">Light Blue</option>
      <option value="lightgreen">Light Green</option>
      <option value="transparent">Transparent PNG</option>
    </select>
  </div>
  <div class="divider" style="width:1px;height:20px;background:var(--border2)"></div>
  <div class="sg"><span class="slabel">Quality</span>
    <select id="quality">
      <option value="high">High Quality</option>
      <option value="standard">Standard</option>
    </select>
  </div>
  <div class="divider"></div>
  <div class="sg">
    <span class="slabel">API Key (Optional)</span>
    <input type="password" id="apiKey" placeholder="Enter remove.bg API key" style="background:var(--card);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:4px;width:200px;font-family:var(--fm);font-size:10px">
  </div>
</div>

<main>
  <div class="upload-zone" id="uploadZone">
    <span style="font-size:48px;display:block;margin-bottom:14px">📷</span>
    <div class="up-title">DROP PHOTOS HERE</div>
    <div class="up-sub">Professional background removal • Perfect edge detection • Hair detail preservation</div>
    <button class="up-btn" onclick="document.getElementById('fileInput').click()">📁 SELECT FILES</button>
    <div class="proc-bar" id="procBar">
      <div class="proc-text" id="procText">PROCESSING...</div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>

  <div id="gallery" style="display:none">
    <div style="font-family:var(--fm);font-size:9px;color:var(--muted);margin-bottom:16px">PROCESSED PHOTOS <span id="photoCount">0</span></div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div id="actionBar">
    <button class="btn btn-ghost" onclick="clearAll()">✕ CLEAR ALL</button>
    <button class="btn btn-zip" onclick="downloadZIP()">⬇ DOWNLOAD ZIP</button>
    <button class="btn btn-print" onclick="downloadAll()">📸 DOWNLOAD ALL</button>
    <span class="info-pill" id="infoPill">Ready</span>
  </div>
</main>

<div id="toast"></div>

<script>
// PROFESSIONAL BACKGROUND REMOVAL USING remove.bg API
// This gives you EXACT same quality as remove.bg website

let processedPhotos = [];
let isProcessing = false;

// Get API key from user or use demo (demo has limits)
// For unlimited use: https://www.remove.bg/api
const DEMO_API_KEY = 'YOUR_FREE_API_KEY_HERE'; // Replace with your key from remove.bg

async function removeBackground(imageFile, bgColor, quality) {
  return new Promise((resolve, reject) => {
    const formData = new FormData();
    formData.append('image_file', imageFile);
    formData.append('size', quality === 'high' ? 'auto' : 'preview');
    
    // Map background colors
    const bgMap = {
      'white': 'white',
      'cream': '#f5f0e8',
      'lightblue': '#d6e4f7',
      'lightgreen': '#d4f0d4',
      'transparent': ''
    };
    
    if (bgColor !== 'transparent') {
      formData.append('bg_color', bgMap[bgColor]);
    }
    
    const apiKey = document.getElementById('apiKey').value || DEMO_API_KEY;
    
    if (!apiKey || apiKey === 'YOUR_FREE_API_KEY_HERE') {
      reject(new Error('Please get a free API key from remove.bg (50 free credits/month)'));
      return;
    }
    
    fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: {
        'X-Api-Key': apiKey
      },
      body: formData
    })
    .then(response => {
      if (!response.ok) {
        return response.json().then(err => {
          throw new Error(err.errors?.[0]?.title || 'API error');
        });
      }
      return response.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      resolve(url);
    })
    .catch(reject);
  });
}

// Alternative: Free API using photoroom (no key required, limited quality)
async function removeBackgroundFree(imageFile, bgColor) {
  const formData = new FormData();
  formData.append('image_file', imageFile);
  
  const bgMap = {
    'white': 'white',
    'cream': '#f5f0e8',
    'lightblue': '#d6e4f7',
    'lightgreen': '#d4f0d4',
    'transparent': ''
  };
  
  if (bgColor !== 'transparent') {
    formData.append('bg_color', bgMap[bgColor]);
  }
  
  // Using a free CORS proxy to access various free APIs
  // Try multiple free endpoints
  const endpoints = [
    'https://api.remove-bg.io/remove',
    'https://backgroundremoverapi.com/api/remove'
  ];
  
  for (const endpoint of endpoints) {
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        body: formData
      });
      
      if (response.ok) {
        const blob = await response.blob();
        return URL.createObjectURL(blob);
      }
    } catch(e) {
      console.log('Endpoint failed:', endpoint);
    }
  }
  
  throw new Error('All free APIs failed. Please use remove.bg API key for professional quality.');
}

async function processFile(file, bgColor, quality) {
  const originalUrl = URL.createObjectURL(file);
  
  // Show preview before processing
  const originalImg = document.createElement('img');
  originalImg.src = originalUrl;
  
  try {
    // Try using API first
    let processedUrl;
    
    // Check if we have API key
    const apiKey = document.getElementById('apiKey').value;
    if (apiKey && apiKey !== 'YOUR_FREE_API_KEY_HERE') {
      processedUrl = await removeBackground(file, bgColor, quality);
    } else {
      // Try free methods first
      try {
        processedUrl = await removeBackgroundFree(file, bgColor);
      } catch(e) {
        // Fallback to demo mode with warning
        throw new Error('Please add your remove.bg API key for professional quality. Get free key at remove.bg/api');
      }
    }
    
    return {
      id: Date.now() + Math.random(),
      name: file.name,
      original: originalUrl,
      processed: processedUrl,
      size: file.size
    };
  } catch(error) {
    console.error('Processing failed:', error);
    throw error;
  }
}

async function handleFiles(files) {
  if (isProcessing) {
    toast('Already processing, please wait...', 'error');
    return;
  }
  
  const validFiles = files.filter(f => f.type.startsWith('image/'));
  if (validFiles.length === 0) {
    toast('No valid image files', 'error');
    return;
  }
  
  isProcessing = true;
  const bgColor = document.getElementById('bgColor').value;
  const quality = document.getElementById('quality').value;
  
  const procBar = document.getElementById('procBar');
  const procText = document.getElementById('procText');
  const progFill = document.getElementById('progFill');
  const gallery = document.getElementById('gallery');
  const actionBar = document.getElementById('actionBar');
  
  procBar.classList.add('active');
  gallery.style.display = 'block';
  actionBar.style.display = 'flex';
  
  let successCount = 0;
  
  for (let i = 0; i < validFiles.length; i++) {
    const file = validFiles[i];
    procText.textContent = `Processing ${i+1}/${validFiles.length}: ${file.name}`;
    progFill.style.width = `${(i / validFiles.length) * 100}%`;
    
    try {
      const result = await processFile(file, bgColor, quality);
      processedPhotos.push(result);
      addPhotoToGrid(result);
      successCount++;
      toast(`✓ ${file.name} processed`, 'success');
    } catch(error) {
      console.error(`Failed to process ${file.name}:`, error);
      toast(`✗ ${file.name}: ${error.message}`, 'error');
    }
  }
  
  procBar.classList.remove('active');
  progFill.style.width = '0%';
  isProcessing = false;
  
  updateStats();
  
  if (successCount === 0) {
    toast('No images processed. Please check your API key.', 'error');
  }
}

function addPhotoToGrid(photo) {
  const grid = document.getElementById('photoGrid');
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.dataset.id = photo.id;
  
  card.innerHTML = `
    <div class="card-imgs">
      <div class="cimg-wrap">
        <img src="${photo.original}" alt="original">
        <span class="cimg-label">ORIGINAL</span>
      </div>
      <div class="cimg-wrap">
        <img src="${photo.processed}" alt="processed">
        <span class="cimg-label enh" style="color:var(--amber)">PROCESSED</span>
      </div>
    </div>
    <div class="card-foot">
      <span class="tag">✓ BG REMOVED</span>
      <span class="card-name" title="${photo.name}">${photo.name.substring(0, 40)}</span>
      <button class="card-del" onclick="deletePhoto(${photo.id})">✕</button>
    </div>
  `;
  
  grid.appendChild(card);
}

function deletePhoto(id) {
  const photo = processedPhotos.find(p => p.id === id);
  if (photo) {
    URL.revokeObjectURL(photo.original);
    URL.revokeObjectURL(photo.processed);
  }
  processedPhotos = processedPhotos.filter(p => p.id !== id);
  const card = document.querySelector(`.photo-card[data-id="${id}"]`);
  if (card) card.remove();
  updateStats();
  
  if (processedPhotos.length === 0) {
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('actionBar').style.display = 'none';
  }
}

function clearAll() {
  processedPhotos.forEach(photo => {
    URL.revokeObjectURL(photo.original);
    URL.revokeObjectURL(photo.processed);
  });
  processedPhotos = [];
  document.getElementById('photoGrid').innerHTML = '';
  document.getElementById('gallery').style.display = 'none';
  document.getElementById('actionBar').style.display = 'none';
  toast('All photos cleared', 'success');
}

function updateStats() {
  const count = processedPhotos.length;
  document.getElementById('photoCount').textContent = count;
  document.getElementById('infoPill').textContent = `${count} photo${count !== 1 ? 's' : ''} ready`;
}

async function downloadZIP() {
  if (processedPhotos.length === 0) {
    toast('No photos to download', 'error');
    return;
  }
  
  toast('Creating ZIP file...', 'info');
  
  const JSZip = window.JSZip;
  const zip = new JSZip();
  
  for (let i = 0; i < processedPhotos.length; i++) {
    const photo = processedPhotos[i];
    try {
      const response = await fetch(photo.processed);
      const blob = await response.blob();
      const fileName = photo.name.replace(/\.[^/.]+$/, '') + '_nobg.png';
      zip.file(fileName, blob);
    } catch(e) {
      console.error('Failed to add file to ZIP:', e);
    }
  }
  
  const content = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(content);
  link.download = 'background_removed_photos.zip';
  link.click();
  URL.revokeObjectURL(link.href);
  toast('ZIP downloaded successfully!', 'success');
}

async function downloadAll() {
  if (processedPhotos.length === 0) {
    toast('No photos to download', 'error');
    return;
  }
  
  for (let i = 0; i < processedPhotos.length; i++) {
    const photo = processedPhotos[i];
    const link = document.createElement('a');
    const fileName = photo.name.replace(/\.[^/.]+$/, '') + '_nobg.png';
    link.download = fileName;
    link.href = photo.processed;
    link.click();
    await new Promise(r => setTimeout(r, 200));
  }
  
  toast(`Downloaded ${processedPhotos.length} photos`, 'success');
}

function toast(msg, type) {
  const toastEl = document.getElementById('toast');
  toastEl.textContent = msg;
  toastEl.className = 'show ' + type;
  setTimeout(() => {
    toastEl.className = '';
  }, 3000);
}

// Event listeners
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files);
  handleFiles(files);
});
fileInput.addEventListener('change', (e) => {
  handleFiles(Array.from(e.target.files));
  fileInput.value = '';
});

// Check for API key on load
window.addEventListener('load', () => {
  const savedKey = localStorage.getItem('removebg_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
  }
  
  document.getElementById('apiKey').addEventListener('change', (e) => {
    localStorage.setItem('removebg_api_key', e.target.value);
  });
  
  // Show info about API key
  toast('💡 Get free API key from remove.bg/api for professional quality (50 free credits/month)', 'info');
});
</script>
</body>
</html>
